name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Least-privilege token: CI jobs only need to read the repo.
permissions:
  contents: read

# Cancel superseded runs on the same ref so quick successive pushes don't
# pile up duplicate CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          # Pinned for deterministic CI — bump deliberately, not via "latest".
          bun-version: 1.3.14

      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install

      - name: Lint (oxlint)
        run: bun run lint

      # Advisory for now: the repo isn't fully oxfmt-clean yet. Drop
      # continue-on-error to make formatting gating after a dedicated
      # `bun run format` pass lands.
      - name: Format check (oxfmt)
        run: bunx oxfmt --check .
        continue-on-error: true

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies (native-git)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/native-git

      - name: Build native-git (for core parity tests)
        run: bun run build:native

      - name: Run tests (shared)
        run: bun run --cwd packages/shared test

      - name: Run tests (core)
        run: bun run --cwd packages/core test

      - name: Run tests (agent)
        run: bun run --cwd packages/agent test

      - name: Run tests (runtime)
        run: bun run --cwd packages/runtime test

      - name: Run tests (server)
        run: bun run --cwd packages/server test

      - name: Run server coverage gate
        run: bun run --cwd packages/server test:coverage:gate

      - name: Run tests (client)
        run: bun run --cwd packages/client test

      - name: Run client coverage (scoped logic layers)
        run: bun run --cwd packages/client test:coverage

  build:
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build

  chrome-extension:
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install

      - name: Build Chrome extension
        run: bun run --cwd packages/chrome-extension build

      - name: Package Chrome extension
        run: bun run --cwd packages/chrome-extension package

      - name: Upload Chrome extension artifact
        uses: actions/upload-artifact@v7
        with:
          name: chrome-extension
          path: packages/chrome-extension/funny-annotator-*.zip
