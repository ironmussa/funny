name: Deploy Docs

on:
  # Auto-deploy is disabled until GitHub Pages is enabled for this repo
  # (Settings → Pages → Build and deployment → Source: "GitHub Actions").
  # Until then the deploy can't create the Pages site and would fail on every
  # docs push. Run it manually from the Actions tab to test, and re-add the
  # `push:` trigger below once Pages is enabled to resume auto-deploys.
  #
  # push:
  #   branches:
  #     - master
  #   paths:
  #     - 'docs/**'
  #     - '.github/workflows/docs.yml'
  workflow_dispatch:

# Allow GITHUB_TOKEN to deploy to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel in-progress production deploys.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0 # full history so VitePress lastUpdated timestamps are accurate

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install

      - name: Build docs
        run: bun run docs:build

      - name: Setup Pages
        uses: actions/configure-pages@v6
        with:
          # Auto-create the Pages site via the API when it isn't enabled yet,
          # so the deploy doesn't fail with "Get Pages site failed / Not Found".
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs/.vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
