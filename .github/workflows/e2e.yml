name: E2E Tests

on:
  pull_request:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: E2eAdminPassword123!
      E2E_ADMIN_USERNAME: admin
      E2E_ADMIN_PASSWORD: E2eAdminPassword123!
      FUNNY_PROJECT_ROOT: /tmp

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Build
        run: bun run build

      - name: Start server
        run: bun start &
        env:
          NODE_ENV: production

      - name: Wait for server
        run: |
          timeout 30 bash -c 'until curl -sf http://localhost:3001 > /dev/null 2>&1; do sleep 1; done'

      - name: Run Playwright tests
        run: bunx playwright test e2e/app.spec.ts e2e/auth.spec.ts
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3001

      - name: Upload test report
        uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload test traces
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 7
