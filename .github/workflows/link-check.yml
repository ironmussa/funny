name: Link Check

on:
  pull_request:
    branches: [master]
    paths:
      - '**/*.md'
      - '.lycheeignore'
      - '.github/workflows/link-check.yml'
  # Weekly sweep catches external link rot that no PR would touch.
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: link-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  links:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check links
        uses: lycheeverse/lychee-action@v2
        with:
          # Retries + accepting 429 (rate limited) and 403 (sites like claude.ai
          # and npmjs.com bot-block link checkers — the pages are fine) keep
          # transient/false external failures from flaking the run.
          # .lycheeignore handles local/example URLs; github.com links are
          # authenticated via the token below.
          args: >-
            --no-progress
            --max-retries 3
            --retry-wait-time 2
            --accept 200,206,403,429
            --exclude-path node_modules
            './**/*.md'
          fail: true
          token: ${{ secrets.GITHUB_TOKEN }}
