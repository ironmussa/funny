name: Security Audit

on:
  push:
    branches: [master, main]
  pull_request:
  schedule:
    # Run daily at 2 AM UTC to catch new vulnerabilities
    - cron: '0 2 * * *'

permissions:
  contents: read

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  security:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Full history for better secret detection

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Secret detection
      - name: Check for leaked secrets
        run: npx secretlint "**/*"
        continue-on-error: false

      # Dependency vulnerability scanning with Snyk
      - name: Run Snyk security scan
        uses: snyk/actions/node@master
        continue-on-error: true # Don't fail the build, just report
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --all-projects --json-file-output=snyk-report.json

      # Dependency vulnerability scan against the REAL dependency tree.
      # This is a bun-first monorepo: bun.lock is the source of truth and
      # `npm audit` / `audit-ci` cannot read it (they build a phantom tree from
      # a non-existent package-lock.json and report false positives). `bun audit`
      # audits exactly what bun installs, so it is the correct gate here.
      #
      # --ignore GHSA-4w7w-66w2-5vf9: vite <=6.4.1 dev-server path traversal,
      # only reachable transitively via vitepress (docs build) which pins
      # vite ^5 — no patched 5.x release exists. Dev/docs-build only; never
      # shipped in the app runtime. Revisit when vitepress moves off vite 5.
      - name: Audit dependencies (bun audit)
        run: bun audit --audit-level=moderate --ignore GHSA-4w7w-66w2-5vf9
        continue-on-error: false # Fail the build on moderate+ vulnerabilities

      # Non-gating JSON report for the uploaded artifact (never fails the build).
      - name: Generate bun audit JSON report
        if: always()
        run: bun audit --json > bun-audit-report.json || true

      # Generate security report
      - name: Generate security summary
        if: always()
        run: |
          echo "## 🔒 Security Audit Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Secret detection completed" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Dependency audit completed" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Vulnerability scan completed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "View detailed results in the job logs above." >> $GITHUB_STEP_SUMMARY

      # Upload results as artifacts
      - name: Upload security scan results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: security-scan-results
          path: |
            snyk-report.json
            bun-audit-report.json
          retention-days: 30
          # Snyk only writes its report when SNYK_TOKEN is set, so the files may
          # be absent — don't warn/fail the upload in that case.
          if-no-files-found: ignore
