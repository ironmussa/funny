# Sentrux architectural rules for the funny monorepo.
#
# Codifies the package layering documented in CLAUDE.md:
#   shared   — leaf types
#   core     — pure logic, depends only on shared
#   runtime  — agent/git execution, depends on core + shared
#   server   — HTTP/auth/db, depends on core + shared
#   client   — React SPA, depends on shared (types) only

# Boundary rules — `from` must NOT import `to`.
# We rely solely on boundaries (no [[layers]]) so Sentrux only checks what we
# explicitly forbid, instead of enforcing strict ordering.

[[boundaries]]
from = "packages/shared/**"
to = "packages/core/**"
reason = "shared is the leaf types module; it must not depend on core."

[[boundaries]]
from = "packages/core/**"
to = "packages/runtime/**"
reason = "core is pure logic; runtime depends on core, not the other way around."

[[boundaries]]
from = "packages/client/**"
to = "packages/server/**"
reason = "client talks to the server over HTTP, never via direct module imports."

# Quality floor — locked just above current worst values so regressions
# are caught while the existing offenders keep building.
# Sentrux counts every text file (incl. .md/.json), so max_file_lines is
# generous to avoid noise from autogenerated schemas and design docs.
# no_god_files is intentionally off because we currently have 23 violators
# and rules.toml has no per-file exclusion in the free tier.
[constraints]
min_modularity = 0.6
min_redundancy = 0.18
max_file_lines = 4000
max_fn_lines = 1500
