# Server test + coverage configuration.
# Aggregate gate lives in scripts/coverage-gate.ts (All files line %).
#
# Exclusions are intentional — not counted toward the aggregate gate.
# Re-enable each file once dedicated tests land (or logic is extracted to
# smaller testable modules).

[test]
# Cross-file mock.module isolation is enforced via the `--isolate` flag on the
# `test` / `test:coverage` scripts (and in scripts/coverage-gate.ts). Without it,
# route/proxy suites that mock.module('ws-relay'|'ws-tunnel'|'runner-resolver')
# leak their stubs into the real-impl suites (ws-tunnel/ws-relay/socketio/runner-
# manager) on CI's runner, where bun's per-file mock reset doesn't kick in.
# maxConcurrency stays at 1 for deterministic ordering.
maxConcurrency = 1
coverageSkipTestFiles = true
coveragePathIgnorePatterns = [
  # UI-only routes — no server logic worth gating yet.
  "src/routes/designs.ts",
  "src/routes/agent-templates.ts",
  # Pipeline CRUD is partially covered (IDOR + happy path); orchestrator
  # approval/progress paths need heavy mocking — excluded until that suite lands.
  "src/routes/pipelines.ts",
]
