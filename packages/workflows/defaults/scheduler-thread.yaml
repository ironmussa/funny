# Default pipeline used by the scheduler to dispatch a queued thread.
#
# v3 — full lifecycle: stage/status flips happen here, in the YAML, so
# the scheduler's planner stays the source of truth for *eligibility*
# while the kanban UI sees a clean "backlog → in_progress → review/done"
# transition driven by the same artifact that runs the work.
#
# Flow:
#   announce-start  → notify (info)
#   mark-running    → set_status running         (UI: "currently working")
#   mark-in-progress→ set_stage in_progress      (kanban column)
#   dispatch        → spawn_agent (the real work)
#   mark-review     → set_stage review           (kanban column for human gate)
#   mark-completed  → set_status completed
#   announce-done   → notify (info)
#
# Override at `<repoRoot>/.funny/workflows/scheduler-thread.yaml`.

name: scheduler-thread
description: Default scheduler dispatch — runs an agent for a queued thread and flips lifecycle.

inputs:
  prompt: { type: string }
  threadId: { type: string }

nodes:
  - id: announce-start
    notify:
      message: 'Scheduler dispatching thread {{ threadId }}'
      level: info

  - id: mark-running
    depends_on: [announce-start]
    set_status:
      value: running
      reason: scheduler-dispatch

  - id: mark-in-progress
    depends_on: [mark-running]
    set_stage:
      value: in_progress
      reason: scheduler-dispatch

  - id: dispatch
    depends_on: [mark-in-progress]
    spawn_agent:
      model: sonnet
      provider: claude
      permission_mode: autoEdit
      prompt: '{{ prompt }}'

  - id: mark-review
    depends_on: [dispatch]
    set_stage:
      value: review
      reason: agent-completed-awaiting-review

  - id: mark-completed
    depends_on: [dispatch]
    set_status:
      value: completed
      reason: scheduler-dispatch

  - id: announce-done
    depends_on: [mark-review, mark-completed]
    notify:
      message: 'Scheduler completed thread {{ threadId }}'
      level: info
